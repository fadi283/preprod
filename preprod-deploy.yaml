apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: preprod
  name: preprod
  namespace: preprod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: preprod
  template:
    metadata:
      labels:
        app: preprod
    spec:
      containers:
      - image: nginx
        imagePullPolicy: Always
        name: nginx
        volumeMounts:
        - mountPath: /usr/share/nginx/html/
          name: storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: preprod-pvc
